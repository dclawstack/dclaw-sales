replicaCount: 1

image:
  repository: ghcr.io/dclawstack/dclaw-sales
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8101

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: sales.dclawstack.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: dclaw-sales-tls
      hosts:
        - sales.dclawstack.io

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

postgresql:
  enabled: true
  storage: 10Gi

serviceAccount:
  create: true
  annotations: {}
  name: ""
